name: Java CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: ./build-jar.sh
      - name: Build flatlaf
        run: ./build-jar-flatlaf.sh
      - uses: actions/upload-artifact@v3
        with:
          name: jar
          path: "*.jar"
